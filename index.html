<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Игровой Мини-Апп</title>
    <style>
        :root {
            --tg-theme-bg-color: #ffffff;
            --tg-theme-text-color: #000000;
            --tg-theme-hint-color: #999999;
            --tg-theme-link-color: #2481cc;
            --tg-theme-button-color: #2481cc;
            --tg-theme-button-text-color: #ffffff;
            --tg-theme-secondary-bg-color: #f0f0f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            min-height: 100vh;
            padding: 20px 16px 40px;
            transition: all 0.3s ease;
        }

        /* Экраны */
        .screen {
            display: none;
            animation: fadeSlideIn 0.3s ease;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Главный экран */
        .welcome-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .welcome-emoji {
            font-size: 72px;
            display: block;
            margin-bottom: 16px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .welcome-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .welcome-subtitle {
            font-size: 15px;
            color: var(--tg-theme-hint-color);
            line-height: 1.5;
        }

        /* Сетка игр */
        .games-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .game-card {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 16px;
            padding: 24px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .game-card:active {
            transform: scale(0.95);
            border-color: var(--tg-theme-button-color);
        }

        .game-card .icon {
            font-size: 44px;
            display: block;
            margin-bottom: 10px;
            transition: transform 0.3s;
        }

        .game-card:active .icon {
            transform: rotate(10deg) scale(1.1);
        }

        .game-card .title {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .game-card .desc {
            font-size: 12px;
            color: var(--tg-theme-hint-color);
        }

        .game-card .badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #ff4757;
            color: white;
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 12px;
            font-weight: 600;
        }

        /* Экран игры */
        .game-header {
            display: flex;
            align-items: center;
            margin-bottom: 24px;
            gap: 12px;
        }

        .back-button {
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .back-button:active {
            transform: scale(0.9);
            opacity: 0.8;
        }

        .game-title {
            font-size: 22px;
            font-weight: 700;
        }

        .game-content {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 20px;
            padding: 24px 16px;
            min-height: 350px;
            text-align: center;
        }

        /* Универсальная кнопка */
        .btn {
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            padding: 14px 28px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 8px 4px;
            transition: all 0.2s;
            display: inline-block;
        }

        .btn:active {
            transform: scale(0.93);
            opacity: 0.85;
        }

        .btn.secondary {
            background: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-button-color);
            border: 2px solid var(--tg-theme-button-color);
        }

        /* Инпут */
        .game-input {
            width: 100%;
            padding: 16px;
            font-size: 20px;
            text-align: center;
            border-radius: 14px;
            border: 2px solid var(--tg-theme-button-color);
            background: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            outline: none;
            margin: 12px 0;
            font-weight: 600;
        }

        .game-input:focus {
            border-color: #764ba2;
            box-shadow: 0 0 0 3px rgba(118, 75, 162, 0.2);
        }

        /* Сообщения */
        .hint-message {
            margin: 16px 0;
            font-size: 18px;
            font-weight: 700;
            min-height: 28px;
            transition: all 0.3s;
        }

        .stats {
            font-size: 14px;
            color: var(--tg-theme-hint-color);
            margin-top: 8px;
        }

        /* Крестики-нолики */
        .board-3x3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            max-width: 280px;
            margin: 20px auto;
        }

        .cell {
            aspect-ratio: 1;
            background: var(--tg-theme-bg-color);
            border-radius: 14px;
            font-size: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 800;
        }

        .cell:active {
            transform: scale(0.9);
            background: #e8e8e8;
        }

        .cell.x { color: #ff6b6b; }
        .cell.o { color: #4ecdc4; }
        .cell.win { 
            animation: pulse 0.6s ease;
            background: rgba(102, 126, 234, 0.2);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Memory Game */
        .memory-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            max-width: 320px;
            margin: 20px auto;
        }

        .memory-cell {
            aspect-ratio: 1;
            background: var(--tg-theme-button-color);
            border-radius: 12px;
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .memory-cell.flipped {
            background: var(--tg-theme-bg-color);
            transform: rotateY(180deg);
        }

        .memory-cell.matched {
            background: #4ecdc4;
            opacity: 0.7;
            pointer-events: none;
        }

        /* Адаптивность */
        @media (max-width: 380px) {
            .games-grid {
                grid-template-columns: 1fr;
            }
            .game-card {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 16px;
                text-align: left;
            }
            .game-card .icon {
                font-size: 36px;
                margin-bottom: 0;
            }
            .memory-grid {
                grid-template-columns: repeat(3, 1fr);
                max-width: 260px;
            }
        }

        /* Вертикальный скролл */
        .game-content-scroll {
            max-height: 60vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body>

    <!-- ГЛАВНЫЙ ЭКРАН -->
    <div id="mainScreen" class="screen active">
        <div class="welcome-header">
            <span class="welcome-emoji">🎮</span>
            <div class="welcome-title">Добро пожаловать!</div>
            <div class="welcome-subtitle">Выберите игру и начните играть прямо сейчас. Все игры работают внутри Telegram!</div>
        </div>

        <div class="games-grid">
            <div class="game-card" onclick="openGame('guess')">
                <span class="icon">🎯</span>
                <div class="title">Угадай число</div>
                <div class="desc">Отгадайте число от 1 до 100</div>
                <span class="badge">NEW</span>
            </div>

            <div class="game-card" onclick="openGame('tictactoe')">
                <span class="icon">❌</span>
                <div class="title">Крестики-нолики</div>
                <div class="desc">Классика для двоих</div>
            </div>

            <div class="game-card" onclick="openGame('memory')">
                <span class="icon">🧠</span>
                <div class="title">Memory</div>
                <div class="desc">Найдите все пары</div>
            </div>

            <div class="game-card" onclick="openGame('math')">
                <span class="icon">🧮</span>
                <div class="title">Математика</div>
                <div class="desc">Проверьте свой счёт</div>
            </div>
        </div>
    </div>

    <!-- ЭКРАН ИГРЫ -->
    <div id="gameScreen" class="screen">
        <div class="game-header">
            <button class="back-button" onclick="closeGame()">←</button>
            <div class="game-title" id="gameTitle">Игра</div>
        </div>
        <div class="game-content" id="gameContent"></div>
    </div>

    <script>
        // ============ ИНИЦИАЛИЗАЦИЯ TELEGRAM WEB APP ============
        const tg = window.Telegram?.WebApp;
        
        if (tg) {
            tg.ready();
            tg.expand();
            
            // Применяем тему Telegram
            document.documentElement.style.setProperty('--tg-theme-bg-color', tg.themeParams.bg_color || '#ffffff');
            document.documentElement.style.setProperty('--tg-theme-text-color', tg.themeParams.text_color || '#000000');
            document.documentElement.style.setProperty('--tg-theme-hint-color', tg.themeParams.hint_color || '#999999');
            document.documentElement.style.setProperty('--tg-theme-link-color', tg.themeParams.link_color || '#2481cc');
            document.documentElement.style.setProperty('--tg-theme-button-color', tg.themeParams.button_color || '#2481cc');
            document.documentElement.style.setProperty('--tg-theme-button-text-color', tg.themeParams.button_text_color || '#ffffff');
            document.documentElement.style.setProperty('--tg-theme-secondary-bg-color', tg.themeParams.secondary_bg_color || '#f0f0f0');
            
            // Кнопка "Назад" в хедере Telegram
            tg.BackButton.show();
            tg.BackButton.onClick(() => {
                if (currentGame) {
                    closeGame();
                } else {
                    tg.close();
                }
            });
        }

        // ============ НАВИГАЦИЯ ============
        let currentGame = null;
        let gameState = {};

        function openGame(gameType) {
            currentGame = gameType;
            document.getElementById('mainScreen').classList.remove('active');
            document.getElementById('gameScreen').classList.add('active');
            
            switch(gameType) {
                case 'guess':
                    initGuessGame();
                    break;
                case 'tictactoe':
                    initTicTacToe();
                    break;
                case 'memory':
                    initMemoryGame();
                    break;
                case 'math':
                    initMathGame();
                    break;
            }
        }

        function closeGame() {
            currentGame = null;
            gameState = {};
            document.getElementById('gameScreen').classList.remove('active');
            document.getElementById('mainScreen').classList.add('active');
            document.getElementById('gameContent').innerHTML = '';
        }

        function sendResult(gameName, result) {
            if (tg && typeof tg.sendData === 'function') {
                tg.sendData(JSON.stringify({
                    game: gameName,
                    result: result
                }));
            }
            // Также можно показать alert
            tg?.showPopup({
                title: 'Результат',
                message: `Игра: ${gameName}\nРезультат: ${result}`,
                buttons: [{type: 'ok'}]
            });
        }

        // ============ ИГРА 1: УГАДАЙ ЧИСЛО ============
        function initGuessGame() {
            document.getElementById('gameTitle').textContent = '🎯 Угадай число';
            gameState.secretNumber = Math.floor(Math.random() * 100) + 1;
            gameState.attempts = 0;

            document.getElementById('gameContent').innerHTML = `
                <p style="font-size:18px; margin-bottom:16px">Я загадал число от <b>1</b> до <b>100</b></p>
                <input type="number" id="guessInput" class="game-input" min="1" max="100" placeholder="Введите число">
                <br>
                <button class="btn" onclick="makeGuess()">Проверить</button>
                <div class="hint-message" id="guessHint"></div>
                <div class="stats">Попыток: <span id="attemptsCount">0</span></div>
                <button class="btn secondary" onclick="initGuessGame()">🔄 Заново</button>
            `;
        }

        window.makeGuess = function() {
            const input = document.getElementById('guessInput');
            const hint = document.getElementById('guessHint');
            const attemptsSpan = document.getElementById('attemptsCount');
            const guess = parseInt(input.value);

            if (isNaN(guess) || guess < 1 || guess > 100) {
                hint.textContent = '⚠️ Введите число от 1 до 100!';
                hint.style.color = '#ff6b6b';
                return;
            }

            gameState.attempts++;
            attemptsSpan.textContent = gameState.attempts;

            if (guess === gameState.secretNumber) {
                hint.textContent = `🎉 Правильно! Это ${gameState.secretNumber}!`;
                hint.style.color = '#4ecdc4';
                input.disabled = true;
                sendResult('Угадай число', `Угадано за ${gameState.attempts} попыток`);
            } else if (guess < gameState.secretNumber) {
                hint.textContent = '📈 Моё число БОЛЬШЕ';
                hint.style.color = '#ffd93d';
            } else {
                hint.textContent = '📉 Моё число МЕНЬШЕ';
                hint.style.color = '#ffd93d';
            }
        };

        // ============ ИГРА 2: КРЕСТИКИ-НОЛИКИ ============
        function initTicTacToe() {
            document.getElementById('gameTitle').textContent = '❌ Крестики-нолики';
            gameState.board = Array(9).fill('');
            gameState.currentPlayer = 'X';
            gameState.gameOver = false;

            renderTicTacToe();
        }

        function renderTicTacToe() {
            let html = '<div class="board-3x3">';
            gameState.board.forEach((cell, i) => {
                html += `<div class="cell ${cell.toLowerCase()}" onclick="makeTicTacToeMove(${i})">${cell}</div>`;
            });
            html += '</div>';
            html += `<p style="margin-top:12px; font-weight:600">Ход игрока: <span style="color:${gameState.currentPlayer === 'X' ? '#ff6b6b' : '#4ecdc4'}">${gameState.currentPlayer}</span></p>`;
            html += '<button class="btn secondary" onclick="initTicTacToe()">🔄 Новая игра</button>';
            
            document.getElementById('gameContent').innerHTML = html;
        }

        window.makeTicTacToeMove = function(index) {
            if (gameState.board[index] || gameState.gameOver) return;
            
            gameState.board[index] = gameState.currentPlayer;
            
            const winner = checkTicTacToeWinner();
            if (winner) {
                gameState.gameOver = true;
                renderTicTacToe();
                setTimeout(() => {
                    sendResult('Крестики-нолики', `Победил ${winner}`);
                }, 300);
                return;
            }
            
            if (!gameState.board.includes('')) {
                gameState.gameOver = true;
                renderTicTacToe();
                setTimeout(() => {
                    sendResult('Крестики-нолики', 'Ничья');
                }, 300);
                return;
            }
            
            gameState.currentPlayer = gameState.currentPlayer === 'X' ? 'O' : 'X';
            renderTicTacToe();
        };

        function checkTicTacToeWinner() {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for (let combo of wins) {
                const [a,b,c] = combo;
                if (gameState.board[a] && gameState.board[a] === gameState.board[b] && gameState.board[a] === gameState.board[c]) {
                    return gameState.board[a];
                }
            }
            return null;
        }

        // ============ ИГРА 3: MEMORY ============
        function initMemoryGame() {
            document.getElementById('gameTitle').textContent = '🧠 Memory Game';
            const emojis = ['🍎','🍊','🍋','🍇','🍓','🍒'];
            gameState.cards = [...emojis, ...emojis].sort(() => Math.random() - 0.5);
            gameState.flipped = [];
            gameState.matched = [];
            gameState.locked = false;

            renderMemory();
        }

        function renderMemory() {
            let html = '<div class="memory-grid">';
            gameState.cards.forEach((emoji, i) => {
                const isRevealed = gameState.flipped.includes(i) || gameState.matched.includes(i);
                const isMatched = gameState.matched.includes(i);
                html += `<div class="memory-cell ${isMatched ? 'matched' : ''} ${isRevealed ? 'flipped' : ''}" 
                             onclick="flipMemoryCard(${i})">${isRevealed ? emoji : '?'}</div>`;
            });
            html += '</div>';
            html += `<p style="margin-top:12px">Найдено пар: ${gameState.matched.length / 2} / 6</p>`;
            html += '<button class="btn secondary" onclick="initMemoryGame()">🔄 Новая игра</button>';
            
            document.getElementById('gameContent').innerHTML = html;
        }

        window.flipMemoryCard = function(index) {
            if (gameState.locked || gameState.flipped.includes(index) || gameState.matched.includes(index)) return;
            
            gameState.flipped.push(index);
            renderMemory();

            if (gameState.flipped.length === 2) {
                gameState.locked = true;
                const [a, b] = gameState.flipped;
                
                if (gameState.cards[a] === gameState.cards[b]) {
                    gameState.matched.push(a, b);
                    gameState.flipped = [];
                    gameState.locked = false;
                    renderMemory();
                    
                    if (gameState.matched.length === gameState.cards.length) {
                        setTimeout(() => {
                            sendResult('Memory', 'Все пары найдены!');
                        }, 300);
                    }
                } else {
                    setTimeout(() => {
                        gameState.flipped = [];
                        gameState.locked = false;
                        renderMemory();
                    }, 700);
                }
            }
        };

        // ============ ИГРА 4: МАТЕМАТИКА ============
        function initMathGame() {
            document.getElementById('gameTitle').textContent = '🧮 Математика';
            gameState.mathScore = 0;
            gameState.mathTotal = 0;
            generateMathProblem();
        }

        function generateMathProblem() {
            const a = Math.floor(Math.random() * 20) + 1;
            const b = Math.floor(Math.random() * 20) + 1;
            const ops = ['+', '-', '×'];
            const op = ops[Math.floor(Math.random() * ops.length)];
            
            let problem, answer;
            switch(op) {
                case '+': problem = `${a} + ${b}`; answer = a + b; break;
                case '-': problem = `${a} - ${b}`; answer = a - b; break;
                case '×': problem = `${a} × ${b}`; answer = a * b; break;
            }
            
            gameState.mathAnswer = answer;
            
            document.getElementById('gameContent').innerHTML = `
                <div style="font-size:36px; font-weight:800; margin:20px 0">${problem} = ?</div>
                <input type="number" id="mathInput" class="game-input" placeholder="Ваш ответ">
                <br>
                <button class="btn" onclick="checkMathAnswer()">Ответить</button>
                <div class="stats" style="margin-top:16px">
                    Правильно: ${gameState.mathScore} / ${gameState.mathTotal}
                </div>
                <button class="btn secondary" onclick="finishMathGame()">Завершить</button>
            `;
        }

        window.checkMathAnswer = function() {
            const input = document.getElementById('mathInput');
            const userAnswer = parseInt(input.value);
            
            if (isNaN(userAnswer)) {
                alert('Введите число!');
                return;
            }
            
            gameState.mathTotal++;
            
            if (userAnswer === gameState.mathAnswer) {
                gameState.mathScore++;
                alert('✅ Правильно!');
            } else {
                alert(`❌ Ошибка! Ответ: ${gameState.mathAnswer}`);
            }
            
            generateMathProblem();
        };

        window.finishMathGame = function() {
            const result = `${gameState.mathScore} из ${gameState.mathTotal}`;
            sendResult('Математика', result);
            closeGame();
        };

        // ============ ГЛОБАЛЬНЫЕ ФУНКЦИИ ============
        window.openGame = openGame;
        window.closeGame = closeGame;
        window.initGuessGame = initGuessGame;
        window.initTicTacToe = initTicTacToe;
        window.initMemoryGame = initMemoryGame;
        window.initMathGame = initMathGame;
        window.finishMathGame = finishMathGame;
        window.checkMathAnswer = checkMathAnswer;
    </script>
</body>
</html>
